<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automately.io | Executive AI Suite</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #05070A;
            --cyan: #00FFCC;
            --panel: rgba(255, 255, 255, 0.03);
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Executive Scan-Line Animation */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--cyan);
            opacity: 0.1;
            animation: scan 12s linear infinite;
            pointer-events: none; z-index: 100;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        .max-w-7xl { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* Professional Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(10px);
            z-index: 50; display: flex; align-items: center;
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-size: 1.25rem; font-weight: 900; display: flex; align-items: center; gap: 0.5rem; }
        .logo-icon { width: 32px; height: 32px; background: var(--cyan); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #000; }
        .logo span { color: var(--cyan); }
        .nav-contact { font-size: 0.75rem; font-weight: 900; color: var(--text-muted); letter-spacing: 0.1em; }

        /* Hero Section */
        .hero { display: flex; align-items: center; gap: 4rem; padding: 180px 0 100px; }
        .hero-text { flex: 1; }
        .hero-h1 { font-size: 5rem; font-weight: 900; line-height: 0.85; margin-bottom: 2rem; letter-spacing: -0.05em; }
        .hero-h1 span { color: var(--text-muted); opacity: 0.5; }
        .hero-p { color: var(--text-muted); font-size: 1.2rem; max-w: 32rem; margin-bottom: 2.5rem; }
        
        .hire-btn {
            padding: 1.2rem 2.5rem; background: #FFF; color: #000; border-radius: 14px;
            font-weight: 900; text-transform: uppercase; border: none; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.75rem; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hire-btn:hover { background: var(--cyan); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,255,204,0.2); }

        /* ARTEM AI INTERFACE */
        #artem-ui { position: fixed; bottom: 30px; right: 30px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; }
        .artem-trigger {
            width: 68px; height: 68px; background: #FFF; color: #000; border-radius: 20px;
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); transition: 0.3s;
        }
        .artem-trigger:hover { background: var(--cyan); transform: scale(1.05); }

        .artem-window {
            width: 340px; height: 450px; background: rgba(10, 12, 16, 0.98);
            backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px; margin-bottom: 20px; display: none; flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .artem-window.active { display: flex; }
        
        .artem-header { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.7rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; display: flex; align-items: center; gap: 0.6rem; letter-spacing: 0.2em; }
        .dot { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 10px var(--cyan); }
        .dot.thinking { background: #FFAA00; box-shadow: 0 0 10px #FFAA00; animation: pulse 1s infinite; }
        
        .artem-body { flex: 1; padding: 1.2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; font-size: 0.8rem; scroll-behavior: smooth; }
        .msg { padding: 0.9rem 1.1rem; border-radius: 16px; max-width: 85%; line-height: 1.4; }
        .msg.artem { background: rgba(0,255,204,0.08); color: #FFF; align-self: flex-start; border: 1px solid rgba(0,255,204,0.1); }
        .msg.user { background: rgba(255,255,255,0.05); color: #EEE; align-self: flex-end; border: 1px solid rgba(255,255,255,0.05); }

        .action-bar { padding: 0 1.2rem 1rem; display: flex; gap: 0.6rem; }
        .btn-sm { padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.65rem; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; gap: 0.4rem; transition: 0.2s; }
        .btn-cyan { background: var(--cyan); color: #000; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #FFF; }
        .btn-cyan:hover { opacity: 0.8; }

        .artem-footer { padding: 1.2rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 0.8rem; align-items: center; }
        .artem-input { flex: 1; background: transparent; border: none; color: #FFF; outline: none; font-size: 0.85rem; }
        .artem-send { background: none; border: none; color: var(--cyan); cursor: pointer; }

        @media (max-width: 900px) {
            .hero { flex-direction: column; text-align: center; padding-top: 140px; }
            .hero-h1 { font-size: 3.5rem; }
            .hero-p { margin: 0 auto 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="max-w-7xl nav-container">
            <div class="logo">
                <div class="logo-icon"><i data-lucide="zap"></i></div>
                AUTOMATELY<span>.IO</span>
            </div>
            <div style="display:flex; gap: 25px; align-items: center;">
                <span class="nav-contact"><i data-lucide="phone" size="14" style="vertical-align: middle; margin-right: 5px;"></i> 07045538510</span>
                <button class="btn-sm btn-cyan" onclick="toggleArtem()">Client Portal</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl">
        <section class="hero">
            <div class="hero-text">
                <h1 class="hero-h1">Automate <br /> <span>Everything.</span></h1>
                <p class="hero-p">Deploy Artem. An autonomous executive agent that handles your lead-gen and workflows 24/7 with professional precision.</p>
                <button class="hire-btn" onclick="toggleArtem()">Hire Artem Agent <i data-lucide="arrow-right"></i></button>
            </div>
            <div style="flex:1; display:flex; justify-content:center;">
                <div style="width: 320px; height: 320px; border: 1px solid rgba(255,255,255,0.05); border-radius: 80px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(0,255,204,0.05) 0%, transparent 70%);">
                    <i data-lucide="brain" style="width: 100px; height: 100px; color: var(--cyan); opacity: 0.4;"></i>
                </div>
            </div>
        </section>
    </main>

    <div id="artem-ui">
        <div class="artem-window" id="artemWindow">
            <div class="artem-header"><div class="dot" id="statusDot"></div> Artem Protocol v2.0</div>
            
            <div class="artem-body" id="artemBody">
                <div class="msg artem">Artem online. Systems nominal. Brief me on your immediate objective, sir.</div>
            </div>

            <div class="action-bar" id="actionBar">
                <button class="btn-sm btn-cyan" onclick="startBooking()"><i data-lucide="calendar"></i> Book Me</button>
                <a href="tel:07045538510" style="text-decoration: none;"><button class="btn-sm btn-outline"><i data-lucide="phone"></i> Call</button></a>
            </div>

            <form class="artem-footer" onsubmit="handleSend(event)">
                <input type="text" id="userInput" class="artem-input" placeholder="Type command..." autocomplete="off">
                <button type="submit" class="artem-send"><i data-lucide="send" size="18"></i></button>
            </form>
        </div>

        <button class="artem-trigger" onclick="toggleArtem()"><i data-lucide="bot"></i></button>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        const win = document.getElementById('artemWindow');
        const body = document.getElementById('artemBody');
        const input = document.getElementById('userInput');
        const dot = document.getElementById('statusDot');
        
        let bookingStep = 0;
        let leadData = { name: '', project: '', time: '' };

        function toggleArtem() { 
            win.classList.toggle('active'); 
            if(win.classList.contains('active')) input.focus();
        }

        function addMsg(txt, side) {
            const d = document.createElement('div');
            d.className = `msg ${side}`;
            d.innerText = txt;
            body.appendChild(d);
            body.scrollTop = body.scrollHeight;
        }

        function handleSend(e) {
            if(e) e.preventDefault();
            const val = input.value.trim();
            if(!val) return;
            
            addMsg(val, 'user');
            input.value = '';
            
            // THINKING STATE
            dot.classList.add('thinking');
            
            setTimeout(() => {
                dot.classList.remove('thinking');
                
                // BOOKING LOGIC
                if (bookingStep === 1) {
                    leadData.name = val;
                    addMsg(`Acknowledged, ${val}. Briefly describe the workflow or project you wish to automate.`, "artem");
                    bookingStep = 2;
                } else if (bookingStep === 2) {
                    leadData.project = val;
                    addMsg("Understood. Finally, when are you available for a direct technical briefing?", "artem");
                    bookingStep = 3;
                } else if (bookingStep === 3) {
                    leadData.time = val;
                    addMsg("Data compiled. Launching secure mail relay to the executive office now.", "artem");
                    
                    // OPEN EMAIL RELAY
                    const subject = encodeURIComponent(`Executive Booking: ${leadData.name}`);
                    const bodyTxt = encodeURIComponent(`Name: ${leadData.name}\nProject: ${leadData.project}\nTime: ${leadData.time}`);
                    window.location.href = `mailto:hello@automately.io?subject=${subject}&body=${bodyTxt}`;
                    
                    bookingStep = 0;
                } else {
                    // Standard responses
                    if(val.toLowerCase().includes('book')) {
                        startBooking();
                    } else if(val.toLowerCase().includes('phone') || val.toLowerCase().includes('call')) {
                        addMsg("The executive line is 07045538510. I have enabled the call dialer.", "artem");
                    } else {
                        addMsg("Artem online. Standing by for operational directives.", "artem");
                    }
                }
            }, 1000);
        }

        function startBooking() {
            if(bookingStep !== 0) return;
            addMsg("Book Me", "user");
            bookingStep = 1;
            setTimeout(() => addMsg("Initiating booking. Please state your full name for the executive log.", "artem"), 600);
        }
    </script>
</body>
</html>
